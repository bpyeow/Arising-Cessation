// Build quiz
function buildQuiz() {
  const container = document.getElementById('quizContainer');
  let currentSection = '';
  let insertBefore = document.querySelector('.answered-count');

  questions.forEach((q, i) => {
    if (q.section && q.section !== currentSection) {
      currentSection = q.section;
      const sec = document.createElement('div');
      sec.className = 'section-title';
      sec.textContent = currentSection;
      container.insertBefore(sec, insertBefore);
    }

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'q' + i;

    const meta = document.createElement('div');
    meta.className = 'q-meta';
    meta.innerHTML = `<div class="q-number">${i+1}</div>`;
    card.appendChild(meta);

    if (q.scene) {
      const scene = document.createElement('div');
      scene.className = 'scene';
      scene.textContent = '📍 ' + q.scene;
      card.appendChild(scene);
    }

    const qtext = document.createElement('div');
    qtext.className = 'q-text';
    qtext.textContent = q.q;
    card.appendChild(qtext);

    const opts = document.createElement('div');
    opts.className = 'options';
    q.options.forEach((opt, j) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = () => selectOption(i, j, btn, opts, exp);
      opts.appendChild(btn);
    });
    card.appendChild(opts);

    const exp = document.createElement('div');
    exp.className = 'explanation';
    exp.innerHTML = '💡 <strong>解析：</strong>' + q.explanation;
    card.appendChild(exp);

    container.insertBefore(card, insertBefore);
  });
}

let answered = new Array(questions.length).fill(null);

function selectOption(qIdx, optIdx, btn, optsDiv, expDiv) {
  if (answered[qIdx] !== null) return;
  answered[qIdx] = optIdx;

  const buttons = optsDiv.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);

  if (optIdx === questions[qIdx].answer) {
    btn.classList.add('correct');
  } else {
    btn.classList.add('wrong');
    buttons[questions[qIdx].answer].classList.add('reveal');
  }

  expDiv.classList.add('show');
  document.getElementById('q' + qIdx).classList.add('answered');

  const count = answered.filter(a => a !== null).length;
  document.getElementById('answeredCount').textContent = `已作答：${count} / ${questions.length}`;

  // progress
  document.getElementById('progressBar').style.width = (count / questions.length * 100) + '%';
}

function submitQuiz() {
  const emailInput = document.getElementById('userEmail').value.trim();
  if (!emailInput || !emailInput.includes('@')) {
    alert('请填写有效的电子邮箱地址，以便接收详细解析。');
    return;
  }

  const submitBtn = document.getElementById('submitBtn');
  submitBtn.textContent = '正在提交并发送邮件...';
  submitBtn.disabled = true;

 

  const total = questions.length;
  let correct = 0;
  
  // 用于统计每个环节的分数
  const secStats = {}; 
  // 用于构建邮件的 HTML 内容
  let emailHtml = `<h2 style="color: #5c3d1e;">您的测验成绩</h2><hr>`;

  // 新增：用于跟踪当前的环节名称
  let currentSectionName = ""; 

  questions.forEach((q, i) => {
    // 关键修正：如果当前题有 section 就更新，没有就沿用上一个
    if (q.section) {
      currentSectionName = q.section;
    }

    if (!secStats[currentSectionName]) {
      secStats[currentSectionName] = { correct: 0, total: 0 };
    }
    secStats[currentSectionName].total++;

    const userAns = answered[i];
    const isCorrect = (userAns === q.answer);
    
    if (isCorrect) {
      correct++;
      secStats[currentSectionName].correct++;
    }

    // 构建每一题的邮件解析内容
    const color = isCorrect ? "#2e7d32" : "#c62828"; // 绿或红
    const userAnsText = userAns !== null ? q.options[userAns] : "未作答";
    const correctAnsText = q.options[q.answer];
    
    emailHtml += `
      <div style="margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px dashed #d4c3a3;">
        <p style="font-weight: bold; margin-bottom: 8px;">第 ${i+1} 题 ${q.scene ? '<br><span style="color:#8b6340; font-weight:normal; font-style:italic;">📍 ' + q.scene + '</span>' : ''}</p>
        <p style="margin-bottom: 8px;">${q.q}</p>
        <p style="color: ${color}; margin-bottom: 4px;"><strong>您的回答：</strong>${userAnsText}</p>
        ${!isCorrect ? `<p style="color: #2e7d32; margin-bottom: 4px;"><strong>正确答案：</strong>${correctAnsText}</p>` : ''}
        <div style="background: #f5f0e8; padding: 12px; border-radius: 6px; margin-top: 10px; font-size: 0.9em; color: #4a3520;">
          💡 <strong>解析：</strong>${q.explanation}
        </div>
      </div>
    `;
  });

  const pct = Math.round(correct / total * 100);
  
  // 整理环节分数格式 (例如 "8/10")
  const formattedSecScores = {};
  for (let sec in secStats) {
    formattedSecScores[sec] = `${secStats[sec].correct}/${secStats[sec].total}`;
  }

  emailHtml = `<h3>总得分: ${correct} / ${total} (${pct}%)</h3>` + emailHtml;

  // 准备发送到后端的 Payload
  const payload = {
    email: emailInput,
    totalScore: `${correct}/${total}`,
    sectionScores: formattedSecScores,
    emailHtmlBody: emailHtml
  };

  // 请将下方的 URL 替换为您部署 Google Apps Script 后获得的 Web App URL
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzgQOrBKJzHljLZQ4YP6fm8boGgitkqLNUk0AFkfoThpjvENn6PlJheP0svRNEUdKzGew/exec";

  // 发送数据到 Google Apps Script
  fetch(WEB_APP_URL, {
    method: 'POST',
    body: JSON.stringify(payload)
  })
  .then(response => response.json())
  .then(data => {
    if(data.status === "success") {
      showScorePanel(correct, total, pct);
    } else {
      alert("提交记录失败，请检查网络。错误信息: " + data.message);
      submitBtn.textContent = '提交测验，查看成绩';
      submitBtn.disabled = false;
    }
  })
  .catch(error => {
    alert("请求发送失败，请稍后再试。");
    submitBtn.textContent = '提交测验，查看成绩';
    submitBtn.disabled = false;
  });
}

function showScorePanel(correct, total, pct) {
  let msg = '';
  if (pct >= 90) msg = '非常出色！您对四圣谛、三法印与缘起的理解已相当深入，继续保持正念修行。<br><br><b>✅ 详细结果与解析已发送至您的邮箱。</b>';
  else if (pct >= 75) msg = '理解不错！有几个概念还可以再深入觉察，建议回顾解析，结合自身经验再反思。<br><br><b>✅ 详细结果与解析已发送至您的邮箱。</b>';
  else if (pct >= 60) msg = '有一定基础，但还有不少误解需要厘清。建议重新阅读解析，多从生活场景中观察。<br><br><b>✅ 详细结果与解析已发送至您的邮箱。</b>';
  else msg = '这些概念需要更多时间消化。不急，慢慢来——佛法不是靠"知道"，而是靠"觉察"。建议从缘起开始重新学习。<br><br><b>✅ 详细结果与解析已发送至您的邮箱。</b>';

  const panel = document.getElementById('scorePanel');
  panel.innerHTML = `
    <div class="score-label">您的得分</div>
    <div class="score-big">${correct} / ${total}</div>
    <div class="score-label">${pct}%</div>
    <div class="score-msg">${msg}</div>
  `;
  panel.classList.add('show');
  
  // 隐藏按钮和邮箱输入框
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('userEmail').parentNode.style.display = 'none';
  
  panel.scrollIntoView({ behavior: 'smooth' });
}

buildQuiz();
</script>
