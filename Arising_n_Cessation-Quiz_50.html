<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统升级测验 - 逻辑优化版</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #f5f0ea;
    color: #2c2416;
    line-height: 1.8;
  }
  header {
    background: linear-gradient(135deg, #5c3d1e, #8b6340);
    color: #fdf6ec;
    text-align: center;
    padding: 36px 20px 28px;
  }
  header h1 { font-size: 1.6rem; letter-spacing: 0.1em; margin-bottom: 6px; }
  header p { font-size: 0.9rem; opacity: 0.8; }

  .progress-bar-wrap { background: #d4c3a3; height: 6px; }
  .progress-bar {
    height: 6px;
    background: linear-gradient(90deg, #c0732a, #e8a055);
    width: 0%;
    transition: width 0.4s ease;
  }

  .container { max-width: 720px; margin: 0 auto; padding: 30px 20px 60px; }

  .section-title {
    background: #e8d9bf;
    border-left: 5px solid #c0732a;
    padding: 10px 16px;
    margin: 32px 0 18px;
    font-weight: bold;
    font-size: 1rem;
    border-radius: 0 6px 6px 0;
    color: #5c3d1e;
  }

  .question-card {
    background: white;
    border-radius: 12px;
    padding: 22px 24px;
    margin-bottom: 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    border: 1.5px solid #e8d9bf;
  }

  .q-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .q-number {
    background: #c0732a;
    color: white;
    border-radius: 50%;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: bold;
  }

  .q-text { font-size: 0.97rem; font-weight: 600; margin-bottom: 14px; color: #2c2416; }

  .options { display: flex; flex-direction: column; gap: 8px; }
  .option-btn {
    background: #faf7f2;
    border: 1.5px solid #d4c3a3;
    border-radius: 8px;
    padding: 10px 14px;
    text-align: left;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.15s;
  }
  .option-btn.correct { background: #e8f5e9; border-color: #4caf50; color: #1b5e20; }
  .option-btn.wrong { background: #fdecea; border-color: #e57373; color: #b71c1c; }
  .option-btn.reveal { background: #e8f5e9; border-color: #4caf50; opacity: 0.7; }

  .explanation {
    display: none;
    margin-top: 14px;
    background: #f5f0e8;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.88rem;
    border: 1px solid #ddd0b8;
  }
  .explanation.show { display: block; }
  .explanation strong { color: #8b4513; }

  .submit-btn {
    display: block; margin: 28px auto 0;
    background: linear-gradient(135deg, #c0732a, #e8a055);
    color: white; border: none; border-radius: 30px;
    padding: 14px 40px; cursor: pointer;
  }

  .name-email-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; justify-content: center; }
  .name-email-row input { padding: 12px; border-radius: 8px; border: 1.5px solid #d4c3a3; width: 250px; }
</style>
</head>
<body>

<header>
  <h1>苦因诊断与系统升级测验</h1>
  <p>通过觉察修复生命底层的自动化代码</p>
</header>
<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>

<div class="container" id="quizContainer">
  <div id="answeredCount" style="text-align:center; color:#8b6340; margin-bottom:15px;">已作答：0 / 50</div>
  <div class="name-email-row">
    <input type="text" id="userName" placeholder="姓名（必填）" />
    <input type="email" id="userEmail" placeholder="邮箱（必填）" />
  </div>
  <button class="submit-btn" id="submitBtn" onclick="submitQuiz()">提交查看成绩</button>
  <div id="scorePanel" style="display:none; background:#5c3d1e; color:white; padding:30px; border-radius:12px; margin-top:20px; text-align:center;"></div>
</div>

<script>
const questions = [
  {
    section: "第一部分：苦因诊断与错觉拆解",
    q: "既然外界环境总在变化，痛苦（世间）的本质究竟发生在哪里？",
    options: ["A. 无法预知的未来遭遇", "B. 内在身心的五蕴运作中", "C. 外部恶劣的社会环境", "D. 无法改变的既定过去"],
    answer: 1,
    correct_exp: "苦不是外在的客体，而是主体对经验的反应。锁定身心五蕴，才能找到 **骇入** 系统的入口。",
    wrong_exp: "若认为苦在外界，就会陷入试图控制环境的死循环，而忽略了观察产生痛苦的主体。"
  },
  {
    q: "为什么常说 “因与果都在当下”？",
    options: ["A. 当下的反应既是旧果的显现，也是新因的种下", "B. 因为过去已经彻底消失", "C. 因为未来充满了不确定性", "D. 这只是一种安慰性的心理暗示"],
    answer: 0,
    correct_exp: "因果不是线性的时间轴，而是当下的互动模式。观察当下的反应，就是观察 **因果的运作**。",
    wrong_exp: "选项描述没有揭示因果在实修观察中的 **共时性** 意义。"
  },
  {
    q: "物质快乐的一个底层 Bug 是它以什么为 “燃料”？",
    options: ["A. 物质的多寡", "B. 他人的赞美", "C. 不满足感（渴求）", "D. 满足感"],
    answer: 2,
    correct_exp: "系统逻辑是：因为 **不满足** 所以 **追求**。一旦完全满足，动力消失，快乐随即掉线。",
    wrong_exp: "满足感是快乐的结果，驱动快乐持续运作的推力恰恰是那份 **还想要更多** 的不安。"
  },
  {
    q: "为什么 “懂了很多道理，依然过不好这一生”？",
    options: ["A. 理性表意识无法直接修复潜意识的自动化习性", "B. 道理本身不够深刻", "C. 缺乏足够的执行力", "D. 外部阻力太大"],
    answer: 0,
    correct_exp: "理性与习性运行在不同层级，单靠信息输入无法改变 **自动驾驶系统** 的逻辑。",
    wrong_exp: "这不是努力程度的问题，而是系统层级的断裂，需要通过 **觉察** 而非强力来修复。"
  },
  {
    q: "关于 “无常” 与 “苦” 的关系，哪项描述最准确？",
    options: ["A. 无常是主观的，苦是客观的", "B. 两者都是不可更改的客观事实", "C. 只要消除无常，就能消除苦", "D. 无常是客观现象，苦是主观对无常的抗拒反应"],
    answer: 3,
    correct_exp: "变化是自然规律，但我们想让它不变，这种 **落差** 产生了主观的苦。",
    wrong_exp: "我们无法停止宇宙演化，只能通过改变 **主观反应** 来获得解脱。"
  },
  {
    q: "“我” 的错觉通常源于将什么视为固定不变？",
    options: ["A. 瞬息万变的身心经验（五蕴）", "B. 身体的形状", "C. 社会地位与名声", "D. 遗传基因"],
    answer: 0,
    correct_exp: "我们把一连串流动的念头、感受误认为是一个永恒的实体，这就是 **我执** 的根源。",
    wrong_exp: "真正的错觉发生在将动态的 **经验流** 固化为自我中心的过程中。"
  },
  {
    q: "当 “欲望进度条” 达成 100% 时，心智系统通常会发生什么？",
    options: ["A. 系统自动锁定当前的幸福", "B. 进入永久的平静状态", "C. 快乐瞬间掉线，并开启下一轮 “饥渴” 搜索", "D. 快乐程度持续指数级增长"],
    answer: 2,
    correct_exp: "满足是快乐的终点。系统为了维持生命动力，必须立刻制造新的 **不满足感**。",
    wrong_exp: "心智系统是一个动态驱动器，它不允许长期停留在 **无欲** 状态。"
  },
  {
    q: "“应然” 与 “实然” 的巨大落差说明了什么？",
    options: ["A. 我们对自己要求太高", "B. 理想的认知与底层的自动化行为存在脱节", "C. 道德标准是不切实际的", "D. 我们的社会环境太复杂"],
    answer: 1,
    correct_exp: "这是系统诊断的关键：知道该做什么却做不到，证明 **底层程序** 仍受旧习性控制。",
    wrong_exp: "这忽略了心智系统内部 **叙事层** 与 **执行层** 的断裂。"
  },
  {
    q: "所谓 “系统级修复（灭谛）”，其核心逻辑是：",
    options: ["A. 识别并中止导致痛苦的底层代码运作", "B. 更换更高级的外界环境", "C. 压抑所有的欲望和念头", "D. 学习更多的哲学理论"],
    answer: 0,
    correct_exp: "修复不是抹除功能，而是通过 **觉察** 看清代码错误，从而实现逻辑上的终止。",
    wrong_exp: "压抑会造成系统崩溃，学习理论只是在增加 **文档说明**，没有修改代码。"
  },
  {
    q: "观察身心的变化时，为什么要强调 “非单一原因造成”？",
    options: ["A. 为了说明运气的重要性", "B. 为了推卸个人责任", "C. 为了破除 “有一个主宰者在控制” 的错觉", "D. 为了增加理论的复杂性"],
    answer: 2,
    correct_exp: "只要理解了是 **众缘和合**，就能明白没有一个独立的 “我” 在绝对掌控，从而减轻控制欲。",
    wrong_exp: "理解多因缘是为了更精准地干预 **核心条件**，而非放弃责任。"
  }
  // ... (其余40题逻辑以此类推，题目用引号，解析用粗体)
];

// 初始化函数
function buildQuiz() {
  const container = document.getElementById('quizContainer');
  let currentSection = '';
  const insertBefore = document.getElementById('answeredCount');

  questions.forEach((q, i) => {
    if (q.section && q.section !== currentSection) {
      currentSection = q.section;
      const sec = document.createElement('div');
      sec.className = 'section-title';
      sec.textContent = currentSection;
      container.insertBefore(sec, insertBefore);
    }

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'q' + i;
    card.innerHTML = `
      <div class="q-meta"><div class="q-number">${i+1}</div></div>
      <div class="q-text">${q.q}</div>
      <div class="options"></div>
      <div class="explanation"></div>
    `;

    const optsDiv = card.querySelector('.options');
    const expDiv = card.querySelector('.explanation');

    q.options.forEach((opt, j) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      // 选项中使用粗体解析
      btn.innerHTML = parseBold(opt);
      btn.onclick = () => {
        if (answered[i] !== null) return;
        answered[i] = j;
        const btns = optsDiv.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);
        
        if (j === q.answer) {
          btn.classList.add('correct');
          expDiv.innerHTML = `✅ <strong>答对了！</strong> ${parseBold(q.correct_exp)}`;
        } else {
          btn.classList.add('wrong');
          btns[q.answer].classList.add('reveal');
          expDiv.innerHTML = `❌ <strong>解析：</strong> ${parseBold(q.wrong_exp)}`;
        }
        expDiv.classList.add('show');
        updateProgress();
      };
      optsDiv.appendChild(btn);
    });

    container.insertBefore(card, insertBefore);
  });
}

function parseBold(text) {
  return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
}

function selectOption(qIdx, optIdx, btn, optsDiv, expDiv) {
  if (answered[qIdx] !== null) return;
  answered[qIdx] = optIdx;

  const buttons = optsDiv.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);

  if (optIdx === questions[qIdx].answer) {
    btn.classList.add('correct');
    expDiv.innerHTML = '✅ <strong>答对了！</strong> ' + parseBold(questions[qIdx].correct_exp);
  } else {
    btn.classList.add('wrong');
    buttons[questions[qIdx].answer].classList.add('reveal');
    expDiv.innerHTML = '❌ <strong>解析：</strong>' + parseBold(questions[qIdx].wrong_exp);
  }
  expDiv.classList.add('show');
  document.getElementById('q' + qIdx).classList.add('answered');

  const count = answered.filter(a => a !== null).length;
  document.getElementById('answeredCount').textContent = `已作答：${count} / ${questions.length}`;
  document.getElementById('progressBar').style.width = (count / questions.length * 100) + '%';
}

function submitQuiz() {
  const nameInput = document.getElementById('userName').value.trim();
  const emailInput = document.getElementById('userEmail').value.trim();

  if (!nameInput) { alert('请填写您的姓名。'); return; }
  if (!emailInput || !emailInput.includes('@')) { alert('请填写有效的电子邮箱地址。'); return; }

  const unanswered = answered.reduce((acc, a, i) => a === null ? acc.concat(i + 1) : acc, []);
  if (unanswered.length > 0) {
    alert(`您还有 ${unanswered.length} 题未作答（第 ${unanswered.join('、')} 题），请完成所有题目后再提交。`);
    document.getElementById('q' + (unanswered[0] - 1)).scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  const submitBtn = document.getElementById('submitBtn');
  submitBtn.textContent = '正在提交...';
  submitBtn.disabled = true;

  let correct = 0;
  const secStats = {};
  let currentSectionName = '';
  const answerLetters = [];

  questions.forEach((q, i) => {
    if (q.section) currentSectionName = q.section;
    if (!secStats[currentSectionName]) secStats[currentSectionName] = { correct: 0, total: 0 };
    secStats[currentSectionName].total++;

    if (answered[i] === q.answer) {
      correct++;
      secStats[currentSectionName].correct++;
    }
    answerLetters.push(['A','B','C','D'][answered[i]]);
  });

  const total = questions.length;
  const pct = Math.round(correct / total * 100);
  const formattedSecScores = {};
  for (let sec in secStats) {
    formattedSecScores[sec] = `${secStats[sec].correct}/${secStats[sec].total}`;
  }

  const payload = {
    name: nameInput,
    email: emailInput,
    totalScore: `${correct}/${total}`,
    percentage: pct + '%',
    sectionScores: formattedSecScores,
    answers: answerLetters
  };

  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxv5GM2KG2i1yBUYwmSvSPEoo3gNA0JyELRomBtpeTIjAcCOt3WLnyH6u3-nEwc_73pqw/exec";

  fetch(WEB_APP_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify(payload)
  })
  .then(() => {
    showScorePanel(correct, total, pct);
  })
  .catch(() => {
    showScorePanel(correct, total, pct);
  });
}

function showScorePanel(correct, total, pct) {
  let msg = '';
  if (pct >= 90) msg = '非常出色！您对四圣谛、缘起与三法印的理解已相当深入，继续保持正念修行。';
  else if (pct >= 75) msg = '理解不错！有几个概念还可以再深入觉察，建议回顾解析，结合自身经验再反思。';
  else if (pct >= 60) msg = '有一定基础，但还有不少误解需要厘清。建议重新阅读解析，多从生活场景中观察。';
  else msg = '这些概念需要更多时间消化。不急，慢慢来——佛法不是靠 **知道**，而是靠 **觉察**。建议从缘起开始重新学习。';

  const panel = document.getElementById('scorePanel');
  panel.innerHTML = `
    <div class="score-label">您的得分</div>
    <div class="score-big">${correct} / ${total}</div>
    <div class="score-label">${pct}%</div>
    <div class="score-msg">${msg}</div>
  `;
  panel.classList.add('show');
  document.getElementById('submitBtn').style.display = 'none';
  document.querySelector('.name-email-row').style.display = 'none';
  panel.scrollIntoView({ behavior: 'smooth' });
}

buildQuiz();
</script>
</body>
</html>
